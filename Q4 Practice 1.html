        width: 615px;

<body>
    <center>
        <br>
        <div class="" >
    <h1>JavaScript Conditional Statements</h1>


        <input type="text" class="form-control" id="Unc" placeholder="drop ur age">
    <button class="btn btn-info" onclick="checkAge()">Check</button>
</div>
<center>

    <script>
        function checkAge(){

        var x = document.getElementById("Unc").value;
        if(isNaN(x) ||  x < 0 ){
            alert("HUY MAGLAGAY KA NG VALID NA NUMBER");
        }
        else if(x<18){
            alert("ikaw ay underage");
        }
        else if(x>18){
            alert("YAY LEGAL KA NA");
        }
        else{
            alert("age ay hindi ko pwedeng i-classify");
        }
        }
    </script>
